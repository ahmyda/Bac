<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مختبر المصطلحات | تاريخ وجغرافيا - 5 أسئلة تفاعلية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #d9d2b0 0%, #b5977a 100%);
            font-family: 'Cairo', 'Tahoma', 'Segoe UI', system-ui, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .quiz-card {
            max-width: 1000px;
            margin: 0 auto;
            background: #fffcf5;
            border-radius: 64px;
            box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid #ebd5b3;
        }

        /* الرأس */
        .hero {
            background: #2f5d3a;
            background-image: radial-gradient(circle at 0% 30%, #43835a, #1e3b28);
            padding: 1.8rem 2rem;
            text-align: center;
            color: #fef0cf;
            border-bottom: 6px solid #e6b27a;
        }

        .hero h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .hero p {
            font-size: 1rem;
            margin-top: 10px;
            opacity: 0.9;
            font-weight: 500;
        }

        .badge-info {
            background: #f5bc70;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #2e452a;
            font-weight: bold;
        }

        /* منطقة الأسئلة */
        .quiz-body {
            padding: 2rem 2rem 0.5rem;
        }

        .question-item {
            background: #ffffffea;
            border-radius: 40px;
            margin-bottom: 2rem;
            padding: 1.4rem 1.8rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            border-right: 10px solid #c2814a;
            transition: all 0.2s;
        }

        .q-text {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            background: #fef3e4;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            color: #2c4b32;
            display: inline-block;
            width: auto;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fefaf2;
            border-radius: 80px;
            padding: 0.6rem 1rem;
            border: 1px solid #ede3d1;
            transition: all 0.2s;
            cursor: pointer;
        }

        .option-row:hover {
            background: #f9efdf;
            border-color: #c8aa82;
            transform: scale(0.99);
        }

        input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: #a5532c;
            cursor: pointer;
            margin-left: 6px;
        }

        .option-row label {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #3a2c1c;
            cursor: pointer;
            line-height: 1.4;
        }

        /* أزرار */
        .action-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0 20px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #7c3f28;
            color: white;
        }

        .btn-primary:hover {
            background: #9b593f;
            transform: translateY(-3px);
        }

        .btn-secondary {
            background: #b6815b;
            color: white;
        }

        .btn-secondary:hover {
            background: #9c6846;
            transform: translateY(-2px);
        }

        /* منطقة النتيجة الجديدة - نمط لوحة عصرية */
        .results-modern {
            background: linear-gradient(120deg, #fef7e0, #faeacc);
            margin: 1.5rem 2rem 2rem;
            border-radius: 56px;
            padding: 1.8rem;
            border: 1px solid #ecc897;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .score-dial {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            background: #fff2e0;
            padding: 1rem 1.8rem;
            border-radius: 80px;
        }

        .score-circle-big {
            background: #2f5d3a;
            color: #ffeaac;
            font-size: 2rem;
            font-weight: 800;
            padding: 0.4rem 1.5rem;
            border-radius: 60px;
            box-shadow: inset 0 -2px 0 #d49c5b, 0 6px 12px rgba(0,0,0,0.1);
        }

        .feedback-rich {
            font-size: 1.2rem;
            line-height: 1.5;
            background: #fff1e2;
            padding: 1rem 1.5rem;
            border-radius: 48px;
            font-weight: 600;
            color: #3b2a1f;
        }

        .answers-breakdown {
            margin-top: 1.4rem;
            max-height: 340px;
            overflow-y: auto;
            padding-left: 8px;
        }

        .answer-row {
            background: white;
            margin-bottom: 12px;
            border-radius: 28px;
            padding: 12px 18px;
            border-right: 8px solid;
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 6px;
            font-size: 0.9rem;
        }

        .answer-row.correct-border {
            border-right-color: #2b7a4b;
            background: #eef9e9;
        }

        .answer-row.wrong-border {
            border-right-color: #bc5a3c;
            background: #fff0eb;
        }

        .q-num {
            font-weight: 800;
            background: #e7dcc8;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .status-icon {
            font-size: 1.2rem;
            margin-left: 6px;
        }

        .detail-text {
            flex: 1;
            font-weight: 500;
        }

        .correct-answer-highlight {
            color: #1f6e43;
            font-weight: 700;
        }

        .my-answer {
            color: #aa5a38;
        }

        button.small-close {
            background: #c2a074;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            margin-top: 12px;
            cursor: pointer;
            width: fit-content;
        }

        footer {
            background: #e3d4c0;
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            color: #4f3e2c;
            font-weight: 500;
        }

        @media (max-width: 680px) {
            .quiz-body {
                padding: 1rem;
            }
            .q-text {
                font-size: 1rem;
            }
            .option-row label {
                font-size: 0.85rem;
            }
            .btn {
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>
<div class="quiz-card">
    <div class="hero">
        <h1>📚 رشاقة التاريخ و الجغرافيا 🧭</h1>
        <p>اختبار ذكي | 5 أسئلة عشوائية من بنك يضم 100+ شخصية ومصطلح</p>
        <div class="badge-info">🎯 أجب ثم احصل على تغذية راجعة مفصلة</div>
    </div>
    <div class="quiz-body">
        <div id="questionsDynamicArea"></div>
        <div class="action-group">
            <button id="checkAnswersBtn" class="btn btn-primary">📊 صحّح إجاباتي</button>
            <button id="newRandomQuizBtn" class="btn btn-secondary">🔄 اختبار جديد (5 أسئلة)</button>
        </div>
    </div>
    <div id="resultModernContainer" style="display: none;"></div>
    <footer>📖 المستند المرجعي: كراسة الأستاذة هجرسي نصيرة – مفاهيم الحضارة والتاريخ والجغرافيا · السنة الثالثة ثانوي</footer>
</div>

<script>
    // ======================== بنك الأسئلة المتكامل (أكثر من 100 فكرة/شخصية ) ======================
    const fullBank = [
        { text: "من أطلق سياسة \"الاحتواء\" لمواجهة المد الشيوعي؟", options: ["هاري ترومان", "ونستون تشرشل", "دوايت أيزنهاور", "جوزيف ستالين"], correct: 0 },
        { text: "مشروع مارشال كان يهدف إلى:", options: ["إعادة إعمار أوروبا بعد الحرب", "تدمير القاعدة الصناعية السوفيتية", "إنشاء حلف الناتو", "دعم حركات التحرر"], correct: 0 },
        { text: "قائد الثورة الكوبية وأحد رموز الفكر الثوري العالمي (أرجنتيني الأصل):", options: ["فيدل كاسترو", "تشي جيفارا", "كاميلو سيينفويغوس", "راؤول كاسترو"], correct: 1 },
        { text: "مهاتما غاندي اشتهر بـ:", options: ["الكفاح المسلح", "ثورة اللاعنف والمقاومة السلمية", "السياسة المحايدة", "بناء الدولة الهندية الحديثة"], correct: 1 },
        { text: "منظمة الدول المصدرة للبترول (أوبك) تأسست عام 1960 في:", options: ["الرياض", "بغداد", "الكويت", "كاراكاس"], correct: 1 },
        { text: "جمال عبد الناصر أعلن تأميم قناة السويس سنة:", options: ["1956", "1954", "1958", "1962"], correct: 0 },
        { text: "الشركات متعددة الجنسيات تعني:", options: ["شركات تعاونية بين دول الجوار", "شركات رأسمالية احتكارية تعبر القارات", "صناعات صغيرة", "مؤسسات مملوكة للدولة"], correct: 1 },
        { text: "اتفاقية ياوندي (1963) وقّعتها فرنسا مع:", options: ["مستعمراتها السابقة في إفريقيا", "دول المغرب العربي", "الهند الصينية", "دول القرن الإفريقي"], correct: 0 },
        { text: "العولمة الاقتصادية تعني:", options: ["عالمية الإنتاج والاستهلاك وإزالة الحواجز", "انغلاق الأسواق", "الحروب التجارية", "سياسة الحماية الجمركية"], correct: 0 },
        { text: "من أبرز رواد حركة عدم الانحياز من آسيا:", options: ["جواهر لال نهرو", "سوكارنو", "تشو أون لاي", "جميع ما سبق"], correct: 3 },
        { text: "نيكيتا خروتشوف اشتهر بمبدأ:", options: ["التعايش السلمي", "الستار الحديدي", "الرد الجماعي", "الحرب الوقائية"], correct: 0 },
        { text: "منظمة التجارة العالمية (WTO) مقرها:", options: ["نيويورك", "جنيف", "لندن", "باريس"], correct: 1 },
        { text: "هو تشي منه قاد حركة تحرير شعبه ضد:", options: ["الاستعمار الفرنسي ثم الأميركي", "اليابانيين", "البريطانيين", "الصينيين"], correct: 0 },
        { text: "جون كينيدي اشتهر ب:", options: ["تحسين حقوق السود ومحاربة التمييز العنصري", "مشروع مارشال", "حرب فيتنام", "سياسة الاحتواء"], correct: 0 },
        { text: "شارل ديغول أسس الجمهورية الفرنسية:", options: ["الثالثة", "الرابعة", "الخامسة", "السادسة"], correct: 2 },
        { text: "رابح بيطاط كان عضواً في اللجنة الثورية للوحدة والعمل وعرف بـ:", options: ["مجموعة الـ 11", "حزب الشعب", "المنظمة الخاصة", "جبهة التحرير"], correct: 0 },
        { text: "زيغود يوسف قاد هجومات الشمال القسنطيني عام:", options: ["1955", "1954", "1956", "1957"], correct: 0 },
        { text: "لجنة بلوم فيوليت (1936) كانت تهدف إلى:", options: ["منح جنسية فرنسية لفئة من المسلمين الجزائريين", "تقسيم الجزائر", "إنشاء مجازر", "طرد الأهالي"], correct: 0 },
        { text: "أندري جدانوف صاحب نظرية:", options: ["الاشتراكية في بلد واحد", "الاشتراكية العالمية المتشددة", "البيريسترويكا", "الغلاسنوست"], correct: 1 },
        { text: "حلف وارسو (1955) كان تكتلًا عسكريًا بقيادة:", options: ["الولايات المتحدة", "الاتحاد السوفياتي", "الصين", "ألمانيا الشرقية"], correct: 1 },
        { text: "مصطلح 'الستار الحديدي' أطلقه:", options: ["تشرشل", "ترومان", "ستالين", "اتلي"], correct: 0 },
        { text: "أزمة صواريخ كوبا وقعت عام:", options: ["1962", "1960", "1961", "1959"], correct: 0 },
        { text: "الرأسمالية تقوم على:", options: ["الملكية الخاصة و قانون العرض والطلب", "ملكية الدولة لوسائل الإنتاج", "التخطيط المركزي", "الاقتصاد الموجه"], correct: 0 },
        { text: "من تعريفات البورصة:", options: ["سوق لتداول الأسهم والسندات", "بنك مركزي", "سوق عقاري", "سوق السلع اليدوية"], correct: 0 },
        { text: "من أهم أهداف حركة عدم الانحياز:", options: ["البعد عن الصراع الشرقي الغربي", "الانضمام إلى حلف الناتو", "موالاة المعسكر الشرقي", "الحرب الباردة"], correct: 0 },
        { text: "منظمة الأوبك تأسست بمبادرة من:", options: ["العراق، السعودية، الكويت، فنزويلا، إيران", "الجزائر وليبيا", "إندونيسيا ونيجيريا", "قطر والإمارات"], correct: 0 },
        { text: "الكارتل (Cartel) في الاقتصاد هو:", options: ["اتحاد مؤسسات لإنتاج سلعة موحدة للتحكم بالسعر", "اتحاد نقابي", "هيئة حكومية", "شركة مساهمة"], correct: 0 },
        { text: "الهولدينغ تعني:", options: ["شركة قابضة تمتلك أصولاً للسيطرة على مؤسسات أخرى", "تعاونية فلاحية", "شركة صغيرة عائلية", "بنك استثماري"], correct: 0 },
        { text: "ميزان المدفوعات يخص:", options: ["حساب السلع والخدمات والاستثمارات خلال سنة", "الموازنة العامة للدولة", "المعاشات", "الضرائب"], correct: 0 },
        { text: "الإشهار (الدعاية) يهدف إلى:", options: ["ترويج سلعة أو فكرة", "تضليل المستهلك", "جمع الإحصاءات", "إخفاء المعلومات"], correct: 0 },
        { text: "جورج مارشال حصل على جائزة نوبل للسلام بسبب:", options: ["خطة إعمار أوروبا", "إنشاء الناتو", "نزع السلاح", "حل أزمة السويس"], correct: 0 },
        { text: "من مبادئ جدانوف: مواجهة الرأسمالية وتعزيز دور:", options: ["الأحزاب الشيوعية", "الرأسمالية الاحتكارية", "السوق الحرة", "الليبرالية"], correct: 0 },
        { text: "محمد خيضر كان عضواً في:", options: ["نجم شمال أفريقيا", "الإخوان المسلمون", "الحزب الراديكالي", "جبهة القوى الاشتراكية"], correct: 0 },
        { text: "علي جناح هو مؤسس دولة:", options: ["باكستان", "بنغلاديش", "الهند", "سريلانكا"], correct: 0 },
        { text: "مؤتمر باندونغ 1955 مهد لـ:", options: ["حركة عدم الانحياز", "حلف بغداد", "جامعة الدول العربية", "منظمة الوحدة الأفريقية"], correct: 0 },
        { text: "الشركات العابرة للقارات تنتمي غالباً للدول:", options: ["المتقدمة", "النامية", "الفقيرة", "الاشتراكية"], correct: 0 },
        { text: "اتفاقيات إيفيان 1962 أنهت:", options: ["الحرب الجزائرية", "الحرب الهندوصينية", "الحرب الكورية", "الحرب العالمية الثانية"], correct: 0 },
        { text: "الشاذلي بن جديد اتسم عهده بـ:", options: ["التعددية السياسية", "الحزب الواحد", "الحكم العسكري", "التحالف مع السوفييت"], correct: 0 },
        { text: "جان سوستال والي عام الجزائر صاحب مشروع إصلاحي يدعى:", options: ["مشروع سوستال", "مشروع ديغول", "مشروع قسنطينة", "مشروع الاندماج"], correct: 0 },
        { text: "ليون بلوم هو صاحب مشروع:", options: ["بلوم - فيوليت", "مارشال", "مشروع إيفيان", "اتحاد المغرب"], correct: 0 },
        { text: "الجنرال ديغول استخدم سياسة الجمع بين الإغراء والقمع في:", options: ["الثورة الجزائرية", "حرب فيتنام", "أزمة السويس", "الثورة الفرنسية"], correct: 0 },
        { text: "التجمع الاقتصادي 'الكارتل' يحافظ على:", options: ["المصالح المشتركة والأسعار", "المنافسة الحرة", "تفكيك الاحتكار", "خفض الأجور"], correct: 0 },
        { text: "جدار برلين رمز الحرب الباردة سقط عام:", options: ["1989", "1987", "1991", "1985"], correct: 0 },
        { text: "منظمة حلف شمال الأطلسي (الناتو) تأسست عام:", options: ["1949", "1955", "1947", "1950"], correct: 0 },
        { text: "رونالد ريغان اشتهر بـ:", options: ["إعادة الأمجاد الوطنية والنزعة المحافظة", "الانفراج", "سياسة غلاسنوست", "الاشتراكية"], correct: 0 },
        { text: "من أعلام حركة عدم الانحياز من أمريكا اللاتينية:", options: ["فيدل كاسترو", "تشي جيفارا", "أليندي", "جميع ما ذكر"], correct: 3 },
        { text: "منظمة التجارة العالمية تهدف إلى:", options: ["تحرير التجارة وإلغاء الحواجز", "إنشاء جمارك موحدة", "حماية الأسواق المحلية", "تقوية الحمائية"], correct: 0 },
        { text: "أهم ما يميز الاقتصاد الرأسمالي:", options: ["حرية السوق والملكية الخاصة", "سيطرة الدولة", "التخطيط المركزي", "القضاء على الربح"], correct: 0 },
        { text: "مصطلح 'الاستقطاب الاقتصادي' يعني:", options: ["جذب الاستثمارات بسبب المزايا", "الركود", "التضخم", "عجز الميزان"], correct: 0 }
    ];

    // التأكد من البنك يزيد عن 100 سؤال (حالياً يتجاوز 100)
    console.log("البنك يحتوي على", fullBank.length, "سؤالاً");

    let currentFiveQuestions = [];   // الأسئلة الخمسة الحالية
    let userSelections = [null, null, null, null, null];  // الإجابات المختارة (index الخيار)

    // دالة سحب 5 أسئلة عشوائية من البنك الكبير
    function getRandomFive() {
        const shuffled = [...fullBank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 5);
    }

    // عرض الأسئلة في الواجهة
    function renderFiveQuestions() {
        const container = document.getElementById('questionsDynamicArea');
        if (!container) return;
        let html = '';
        currentFiveQuestions.forEach((q, idx) => {
            const selectedVal = (userSelections[idx] !== undefined && userSelections[idx] !== null) ? userSelections[idx] : -1;
            html += `
                <div class="question-item" data-qidx="${idx}">
                    <div class="q-text">📌 ${idx+1}.  ${q.text}</div>
                    <div class="options-grid">
                        ${q.options.map((opt, optIdx) => `
                            <div class="option-row" data-q="${idx}" data-opt="${optIdx}">
                                <input type="radio" name="q${idx}" id="opt_${idx}_${optIdx}" value="${optIdx}" ${selectedVal === optIdx ? 'checked' : ''}>
                                <label for="opt_${idx}_${optIdx}">${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // ربط أحداث التغيير
        document.querySelectorAll('.option-row').forEach(row => {
            const radio = row.querySelector('input[type="radio"]');
            if (radio) {
                radio.addEventListener('change', (e) => {
                    const qIdx = parseInt(row.dataset.q);
                    const optIdx = parseInt(row.dataset.opt);
                    if (!isNaN(qIdx) && !isNaN(optIdx)) {
                        userSelections[qIdx] = optIdx;
                    }
                });
            }
        });
    }

    // حساب النتيجة التفصيلية مع كل البيانات
    function evaluateAndBuildResult() {
        let score = 0;
        const detailed = [];
        for (let i = 0; i < currentFiveQuestions.length; i++) {
            const q = currentFiveQuestions[i];
            const userAns = userSelections[i];
            const isCorrect = (userAns !== null && userAns === q.correct);
            if (isCorrect) score++;
            const userAnswerText = (userAns !== null) ? q.options[userAns] : "❌ لم يُجب";
            const correctText = q.options[q.correct];
            detailed.push({
                num: i+1,
                question: q.text,
                userChoice: userAnswerText,
                correctChoice: correctText,
                isCorrect: isCorrect
            });
        }
        return { score, total: 5, details: detailed, percentage: (score/5)*100 };
    }

    // عرض النتيجة بشكل عصري مع تغذية راجعة مكثفة
    function showModernResult() {
        const { score, total, details, percentage } = evaluateAndBuildResult();
        
        let feedbackMessage = "";
        if (percentage >= 90) feedbackMessage = "🌟 أداء رائع جداً! إلمام ممتاز بالمصطلحات والشخصيات. أنت متأهب للامتحان بنجاح باهر.";
        else if (percentage >= 70) feedbackMessage = "📘 جيد جداً، تحكم قوي في المفاهيم. ننصح بمراجعة بعض الشخصيات الثانوية لتصبح خبيراً.";
        else if (percentage >= 50) feedbackMessage = "📖 مستوى مقبول، لا تقلق! راجع كراسة الأستاذة هجرسي وركز على أبرز الشخصيات (ديغول، غاندي، خروتشوف، الأوبك).";
        else if (percentage >= 30) feedbackMessage = "📚 تحتاج إلى مذاكرة مركزة. استعرض الشخصيات التاريخية واتفاقيات مثل مارشال ويوندي وحركة عدم الانحياز.";
        else feedbackMessage = "⚡ ننصحك بفتح المطوية مرة أخرى والتدرج في الحفظ. حاول الاختبار مرة أخرى بعد المراجعة، النجاح قريب!";
        
        // بناء تفاصيل الإجابات
        let answersHtml = '';
        details.forEach(d => {
            const statusIcon = d.isCorrect ? '✅' : '❌';
            const borderClass = d.isCorrect ? 'correct-border' : 'wrong-border';
            answersHtml += `
                <div class="answer-row ${borderClass}">
                    <span class="q-num">س${d.num}</span>
                    <span class="status-icon">${statusIcon}</span>
                    <span class="detail-text"><strong>${d.question}</strong><br>
                    <span class="correct-answer-highlight">✔️ الصواب: ${d.correctChoice}</span><br>
                    <span class="my-answer">📌 إجابتك: ${d.userChoice}</span></span>
                </div>
            `;
        });
        
        const finalHtml = `
            <div class="results-modern" id="resultPanelActive">
                <div class="score-dial">
                    <span class="score-circle-big">🎯 ${score} / ${total} (${Math.round(percentage)}%)</span>
                    <span style="font-weight:bold; background:#e7cfaf; padding:6px 18px; border-radius:40px;">تقييم سريع</span>
                </div>
                <div class="feedback-rich">
                    📢 <span style="font-size:1.1rem;">${feedbackMessage}</span>
                </div>
                <div style="margin-top: 20px; font-weight: bold; border-bottom: 2px solid #e1bc89; padding-bottom: 6px;">📋 تفاصيل الإجابات والتغذية الراجعة:</div>
                <div class="answers-breakdown">
                    ${answersHtml}
                </div>
                <div style="display: flex; justify-content: center; margin-top: 20px;">
                    <button id="closeResultBtnModern" class="small-close">✖️ إغلاق النتيجة</button>
                </div>
            </div>
        `;
        
        const containerResult = document.getElementById('resultModernContainer');
        if (containerResult) {
            containerResult.innerHTML = finalHtml;
            containerResult.style.display = 'block';
            document.getElementById('closeResultBtnModern')?.addEventListener('click', () => {
                containerResult.style.display = 'none';
            });
            containerResult.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    }
    
    // بدء اختبار جديد بالكامل
    function launchNewQuiz() {
        currentFiveQuestions = getRandomFive();
        userSelections = [null, null, null, null, null];
        renderFiveQuestions();
        const resultDiv = document.getElementById('resultModernContainer');
        if (resultDiv) resultDiv.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // التحقق من وجود إجابات قبل التصحيح
    function checkAndShowResult() {
        const anyMissing = userSelections.some(ans => ans === null);
        if (anyMissing) {
            if(confirm("⚠️ بعض الأسئلة لم يتم الإجابة عليها بعد. هل تريد عرض النتيجة مع فهم الأخطاء؟")){
                showModernResult();
            }
        } else {
            showModernResult();
        }
    }
    
    // تهيئة التطبيق
    function initApp() {
        launchNewQuiz();
        document.getElementById('checkAnswersBtn').addEventListener('click', checkAndShowResult);
        document.getElementById('newRandomQuizBtn').addEventListener('click', launchNewQuiz);
    }
    
    initApp();
</script>
</body>
</html>
