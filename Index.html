<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>اختبار المصطلحات والشخصيات | تاريخ وجغرافيا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f7f3e9 0%, #e8e0d3 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Almarai', 'Amiri', system-ui, sans-serif;
            padding: 2rem 1rem;
            color: #2c2418;
        }

        /* الحاوية الرئيسية */
        .quiz-container {
            max-width: 950px;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid #e2d5c0;
        }

        /* الرأس */
        .quiz-header {
            background: #8b3c2c;
            background-image: radial-gradient(circle at 10% 30%, #a75540, #6e2c1f);
            padding: 1.5rem 2rem;
            text-align: center;
            color: #ffefdb;
            border-bottom: 5px solid #f5bc70;
        }

        .quiz-header h1 {
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            font-weight: 800;
            text-shadow: 2px 2px 0 #4e2b1e;
        }

        .quiz-header p {
            font-size: 1rem;
            margin-top: 0.5rem;
            opacity: 0.9;
            font-weight: 500;
        }

        /* منطقة الأسئلة */
        .quiz-body {
            padding: 2rem 2rem 1.5rem;
        }

        .question-card {
            background: #fef9ef;
            border-radius: 36px;
            padding: 1.5rem;
            margin-bottom: 2.2rem;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
            border-right: 8px solid #c47e5a;
            transition: 0.2s;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            line-height: 1.5;
            color: #2b3b2c;
            background: #fff3e4;
            padding: 0.8rem 1rem;
            border-radius: 32px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 0.5rem;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: white;
            border: 1px solid #e9dfcf;
            border-radius: 60px;
            padding: 0.7rem 1rem;
            transition: 0.15s;
            cursor: pointer;
        }

        .option:hover {
            background: #f5ede2;
            border-color: #c29a7a;
            transform: scale(0.99);
        }

        input[type="radio"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #b97f5e;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            background: white;
        }

        input[type="radio"]:checked {
            background: #b5623c;
            border-color: #b5623c;
            box-shadow: inset 0 0 0 4px white;
        }

        .option label {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #3e2c1e;
            cursor: pointer;
            line-height: 1.4;
        }

        /* أزرار التحكم */
        .action-bar {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 10px;
            padding: 0 0.5rem 1rem;
        }

        button {
            background: #6e3b2b;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: #8f4e38;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #bc8f6e;
        }

        .btn-secondary:hover {
            background: #a57756;
        }

        .result-area {
            background: #e9dfcf;
            margin: 1.5rem 2rem 2rem;
            border-radius: 40px;
            padding: 1.5rem;
            text-align: center;
            font-weight: bold;
            border-top: 5px solid #c47e5a;
        }

        .score-circle {
            background: #31241a;
            color: #ffddb0;
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .feedback {
            font-size: 1.15rem;
            margin-top: 0.8rem;
            line-height: 1.6;
        }

        hr {
            margin: 1rem 0;
            border: 1px dashed #dac29c;
        }

        footer {
            font-size: 0.75rem;
            text-align: center;
            background: #f5ede2;
            padding: 1rem;
            color: #79624b;
        }

        @media (max-width: 680px) {
            .quiz-body {
                padding: 1.2rem;
            }
            .question-text {
                font-size: 1.1rem;
            }
            button {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container">

    </div>
    <div class="quiz-body" id="quizBody">

        <div id="questionsContainer"></div>

            <button id="newQuizBtn" class="btn-secondary">🔄 اختبار جديد (10 عشوائية)</button>
        </div>
    </div>
    <div id="resultPanel" class="result-area" style="display: none;">
        <!-- النتيجة والتغذية الراجعة -->
    </div>
    <footer>المصادر: مذكرات الأستاذة هجرسي نصيرة – مفاهيم وشخصيات تاريخية وجغرافية 👩‍🏫</footer>
</div>

        { text: "من قادة جبهة التحرير الوطني الجزائرية:", options: ["العربي بن مهيدي", "عبد الحميد مهري", "مصالي الحاج", "فرحات عباس فقط"], correct: 0 },
        { text: "الاشتراكية العالمية المتشددة مرتبطة بـ:", options: ["جدانوف", "ستالين", "لينين", "ماركس"], correct: 0 },
        { text: "جورج مارشال حصل على جائزة نوبل للسلام بسبب:", options: ["مشروعه الاقتصادي لإعمار أوروبا", "نزع السلاح", "إنشاء الأمم المتحدة", "حل أزمة السويس"], correct: 0 },
        { text: "مصطلح 'الكومنفورم' كان لتنسيق:", options: ["الأحزاب الشيوعية", "الأسواق المالية", "التعاون النووي", "الاستخبارات"], correct: 0 },
        { text: "الرئيس الأمريكي الذي اغتيل في الستينات ودعم الحقوق المدنية:", options: ["جون كينيدي", "ليندون جونسون", "ريتشارد نيكسون", "دوايت أيزنهاور"], correct: 0 },
        { text: "أحد عناصر المنظمة الخاصة ووزير جزائري سابق:", options: ["محمد خيضر", "عمار أوعمران", "عبد العزيز بوتفليقة", "محمد الصديق بن يحيى"], correct: 0 },
        { text: "مؤتمر بلغراد 1961 أسس لـ:", options: ["حركة عدم الانحياز", "منظمة الوحدة الأفريقية", "جامعة الدول العربية", "الاتحاد الأوروبي"], correct: 0 },
        { text: "وادي الذهب والفضة في الاقتصاد الإسلامي? (سؤال عام) : الرأسمالية مصطلح:", options: ["اقتصاد السوق الحر", "اقتصاد موجه", "اقتصاد اشتراكي", "اقتصاد كفاف"], correct: 0 },
        { text: "مصطلح 'هولدينغ' يعني:", options: ["شركة قابضة", "اتحاد نقابي", "تكتل عمالي", "مؤسسة خيرية"], correct: 0 },
        { text: "من النظريات الاقتصادية: 'حرية التجارة' تؤدي إلى:", options: ["زيادة التنافسية وخفض الأسعار", "تعزيز الحمائية", "تراجع الصادرات", "غلق الأسواق"], correct: 0 },
        { text: "أول رئيس جزائري بعد الاستقلال مباشرة انتخب:", options: ["فرحات عباس", "أحمد بن بلة", "هواري بومدين", "محمد خيضر"], correct: 1 },
        { text: "مدينة 'ياوندي' عاصمة:", options: ["الكاميرون", "السنغال", "ساحل العاج", "الكونغو"], correct: 0 },
        { text: "منظمة الدول المصدرة للبترول تضم الجزائر منذ:", options: ["1969", "1973", "1965", "1960"], correct: 0 },
        { text: "من أعلام حركة عدم الانحياز من يوغوسلافيا:", options: ["تيتو", "نيكولاي تشاوتشيسكو", "دوبتشيك", "هونيكر"], correct: 0 },
        { text: "الجنرال ديغول قال 'الجزائر جزائرية' في:", options: ["خطاب 1958", "اتفاقيات إيفيان", "بيان فبراير", "مشروع سوستال"], correct: 0 },
        { text: "البنك الدولي وصندوق النقد الدولي تأسسا بعد:", options: ["الحرب العالمية الثانية", "الحرب الباردة", "انهيار جدار برلين", "أزمة 1929"], correct: 0 },
        { text: "مؤتمر طهران ومؤتمر يالطا عُقدا إبان الحرب العالمية الثانية بين الحلفاء.", options: ["صحيح", "خطأ", "غير معروف"], correct: 0 },
        { text: "أول قمر صناعي سوفيتي (سبوتنيك) أطلق عام:", options: ["1957", "1955", "1960", "1959"], correct: 0 },
        { text: "أزمة برلين وبناء الجدار عام:", options: ["1961", "1963", "1958", "1962"], correct: 0 }
    ];

    // تأكد من أن البنك يحتوي على أكثر من 100 سؤال (الطول الحالي 110+)
    console.log("عدد الأسئلة في البنك:", BANK.length); // يجب أن يكون >100

    // متغيرات عامة
    let currentQuestions = [];      // يسجل الأسئلة المختارة (10 عناصر)
    let userAnswers = new Array(10).fill(null);    // إجابات المستخدم (رقم الـ index)

    // دالة لاختيار 10 أسئلة عشوائية
    function pickRandomQuestions() {
        const shuffled = [...BANK];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, 10);
    }

    // عرض الأسئلة على الواجهة
    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        if (!container) return;
        let html = '';
        currentQuestions.forEach((q, idx) => {
            const selectedVal = (userAnswers[idx] !== null && userAnswers[idx] !== undefined) ? userAnswers[idx] : -1;
            html += `
                <div class="question-card" data-qidx="${idx}">
                    <div class="question-text">${idx+1}.  ${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, optIdx) => `
                            <div class="option" data-qidx="${idx}" data-optidx="${optIdx}">
                                <input type="radio" name="q${idx}" id="q${idx}_opt${optIdx}" value="${optIdx}" ${selectedVal === optIdx ? 'checked' : ''}>
                                <label for="q${idx}_opt${optIdx}">${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;

        // إعادة ربط الأحداث لكل خيار
        document.querySelectorAll('.option').forEach(optDiv => {
            const radio = optDiv.querySelector('input[type="radio"]');
            if (radio) {
                radio.addEventListener('change', (e) => {
                    const qIdx = parseInt(optDiv.dataset.qidx);
                    const optVal = parseInt(optDiv.dataset.optidx);
                    if (!isNaN(qIdx) && !isNaN(optVal)) {
                        userAnswers[qIdx] = optVal;
                    }
                });
            }
        });
        // إخفاء نتيجة سابقة
        const resultPanel = document.getElementById('resultPanel');
        if (resultPanel) resultPanel.style.display = 'none';
    }

    // حساب النتيجة
    function computeScore() {
        let score = 0;
        let details = [];
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            const userAns = userAnswers[i];
            const isCorrect = (userAns !== null && userAns === q.correct);
            if (isCorrect) score++;
            // جمع تفاصيل قصيرة للرد
            const correctText = q.options[q.correct];
            const userChoiceText = (userAns !== null) ? q.options[userAns] : "لم تجب";
            details.push({
                num: i+1,
                question: q.text,
                userAnswer: userChoiceText,
                correctAnswer: correctText,
                isCorrect: isCorrect
            });
        }
        return { score, total: currentQuestions.length, details };
    }

    // عرض النتيجة مع تغذية راجعة مفصلة
    function showResult() {
        const { score, total, details } = computeScore();
        const percentage = Math.round((score/total)*100);
        let feedbackMsg = "";
        if (percentage >= 90) feedbackMsg = "🏆 ممتاز! مستوى عالٍ في المصطلحات التاريخية والجغرافية. استمر في التفوق!";
        else if (percentage >= 70) feedbackMsg = "📘 جيد جداً، لكن ينصح بمراجعة بعض الشخصيات والمفاهيم. اجتهد أكثر!";
        else if (percentage >= 50) feedbackMsg = "📖 مقبول، تحتاج تعزيز المعلومات حول أبرز الشخصيات والاتفاقيات. راجع الكراسة.";
        else feedbackMsg = "📚 تحتاج إلى مراجعة شاملة للمصطلحات والشخصيات. استعن بالكراسة وحاول مجدداً!";

        let resultHtml = `
            <div class="score-circle">النتيجة: ${score} / ${total} (${percentage}%)</div>
            <div class="feedback">📌 ${feedbackMsg}</div>
            <hr>
            <div style="text-align: right; max-height: 300px; overflow-y: auto; font-size: 0.9rem;">
        `;
        details.forEach(d => {
            const icon = d.isCorrect ? '✅' : '❌';
            resultHtml += `<p><strong>${icon} السؤال ${d.num}:</strong> ${d.question}<br>
            <span style="color:#4a6741;">✔️ الإجابة الصحيحة: ${d.correctAnswer}</span><br>
            <span style="color:#b1624b;">📌 إجابتك: ${d.userAnswer}</span></p>`;
        });
        resultHtml += `</div><button id="closeResultBtn" class="btn-secondary" style="margin-top:15px;">🗑️ إغلاق النتيجة</button>`;
        const panel = document.getElementById('resultPanel');
        if (panel) {
            panel.innerHTML = resultHtml;
            panel.style.display = 'block';
            document.getElementById('closeResultBtn')?.addEventListener('click', () => {
                panel.style.display = 'none';
            });
        }
        // تمرير سلس إلى النتيجة
        panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // بدء اختبار جديد (عشوائي كامل)
    function startNewQuiz() {
        currentQuestions = pickRandomQuestions();
        userAnswers = new Array(10).fill(null);
        renderQuiz();
        const panel = document.getElementById('resultPanel');
        if (panel) panel.style.display = 'none';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // تهيئة أولية
    function init() {
        startNewQuiz();
        document.getElementById('submitQuizBtn').addEventListener('click', () => {
            let unanswered = userAnswers.some(ans => ans === null);
            if (unanswered) {
                if(confirm("بعض الأسئلة لم يتم الإجابة عليها. هل تريد عرض النتيجة على أي حال؟")){
                    showResult();
                }
            } else {
                showResult();
            }
        });
        document.getElementById('newQuizBtn').addEventListener('click', startNewQuiz);
    }

    init();
</script>
</body>
</html>
